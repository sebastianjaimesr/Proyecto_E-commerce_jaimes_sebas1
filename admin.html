<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | UNDERGOLD</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/admin.css">
</head>
<body class="admin-page">
  <div class="auth-shell">
    <section class="auth-card">
      <div class="auth-header">
        <span class="auth-badge">Área de administración</span>
        <h1>Accede con tu cuenta premium.</h1>
        <p>Ingresa con el usuario predeterminado para gestionar el dashboard y continuar con el proyecto.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="field-group">
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" placeholder="admin@mail.com" required>
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="123456" required>
        </div>

        <button type="submit" class="btn btn-primary">Ingresar</button>

        <p class="auth-note">Email: <strong>admin@mail.com</strong> | Contraseña: <strong>123456</strong></p>
        <p class="auth-message" id="message"></p>
      </form>
    </section>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
