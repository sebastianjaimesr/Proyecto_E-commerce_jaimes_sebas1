<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | UNDERGOLD</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/ecommerce.css">
</head>
<body>
  <premium-navbar></premium-navbar>

  <main class="page-shell">
    <section class="section-header">
      <div>
        <p class="section-kicker">Tu carrito</p>
        <h1>Revisa tus artículos antes de confirmar</h1>
      </div>
    </section>

    <section class="cart-shell">
      <div class="cart-list" id="cartList"></div>
      <aside class="cart-summary">
        <div class="detail-card">
          <h2>Resumen</h2>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cartSubtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Envío</span>
            <span>$0.00</span>
          </div>
          <div class="summary-row total-row">
            <strong>Total</strong>
            <strong id="cartTotal">$0.00</strong>
          </div>
          <button id="checkoutButton" class="btn btn-primary">Confirmar pedido</button>
        </div>

        <div class="detail-card">
          <p class="section-text">Al confirmar, el pedido se guarda en el historial y estará disponible en el panel administrativo.</p>
        </div>
      </aside>
    </section>
  </main>

  <modal-dialog id="checkoutModal">
    <div id="checkoutModalContent"></div>
  </modal-dialog>

  <script type="module" src="components/navbar.js"></script>
  <script type="module" src="components/modal-dialog.js"></script>
  <script type="module" src="js/cart.js"></script>
</body>
</html>
